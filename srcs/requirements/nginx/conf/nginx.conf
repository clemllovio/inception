events {}

http {
	server {
		listen 443 ssl; #IPv4
		listen [::]:443 ssl; #IPv6

		ssl_protocols TLSv1.2 TLSv1.3;
		ssl_certificate /etc/nginx/ssl/inception.crt;
		ssl_certificate_key /etc/nginx/ssl/inception.key;

		index index.html index index.php; #default page
		server_name cllovio.42.fr;
		
		location / {
			try_files $uri $uri/ =404; #error 404
		}

		location ~ \.php$ {
			include 	fastcgi_params;
			# fastcgi_pass wordpress::9000;
		}
	}
}